name: generate_today_html

on:
  push:
    branches:
     - main
  schedule:
    - cron: "0 9,21 * * *"
  workflow_dispatch: # Allow manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build TypeScript
        run: npm run build
      - name: Generate matches.json
        env:
          TZ: America/New_York
        run: npm run start
      - name: Install Angular dependencies
        run: npm ci
        working-directory: client
      - name: Build Angular email-collector library
        run: npm run build:lib
        working-directory: client
      - name: Build Angular email pre-render
        run: npm run build:email
        working-directory: client
      - name: Commit generated files if changed
        run: |-
          git diff
          git config --global user.email "actions@users.noreply.github.com"
          git config --global user.name "JEFF-bot"
          # Force-add generated artifacts — both are in .gitignore but committed intentionally
          git add -f client/public/matches.json
          git add -f client/dist/client/browser/index.html
          git commit -m "Updated matches.json and pre-rendered index.html with today's games" || exit 0
          git push
