name: send_test_email

on:
  workflow_dispatch:
    inputs:
      to_email:
        description: 'Email address to send the test to'
        required: true
        type: string
      date:
        description: 'Date to generate data for (YYYY-MM-DD, defaults to today)'
        required: false
        type: string
        default: ''
      skip_fixture_check:
        description: 'Send even if matches.json has no fixtures'
        required: false
        type: boolean
        default: false

jobs:
  send-test-email:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Generate matches.json
        env:
          TZ: America/New_York
          DATE_OVERRIDE: ${{ inputs.date }}
        run: node dist/index.js

      - name: Install Angular dependencies
        run: npm ci
        working-directory: client

      - name: Build Angular email-collector library
        run: npm run build:lib
        working-directory: client

      - name: Build Angular email pre-render
        run: npm run build:email
        working-directory: client

      - name: Check for fixtures
        id: check-fixtures
        run: |
          MATCH_COUNT=$(jq '.todayMatches | length' client/public/matches.json)
          echo "Found $MATCH_COUNT fixtures"
          if [ "$MATCH_COUNT" -eq 0 ] && [ "${{ inputs.skip_fixture_check }}" != "true" ]; then
            echo "No fixtures and skip_fixture_check=false, skipping send"
            echo "should_send=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_send=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send test email
        if: steps.check-fixtures.outputs.should_send == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ inputs.to_email }}
          DATE_OVERRIDE: ${{ inputs.date }}
        run: |
          set -euo pipefail

          if [ -n "${DATE_OVERRIDE}" ]; then
            SUBJECT_DATE=$(date -d "${DATE_OVERRIDE}" +'%A, %B %d, %Y')
          else
            SUBJECT_DATE=$(date +'%A, %B %d, %Y')
          fi
          SUBJECT="[TEST] Major League Soccer Today - ${SUBJECT_DATE}"
          BASE_HTML=$(cat client/dist/client/browser/index.html)

          EMAIL_HTML="${BASE_HTML//\{\{UNSUBSCRIBE_URL\}\}/TEST_UNSUBSCRIBE_PLACEHOLDER}"

          PAYLOAD=$(jq -n \
            --arg from "MLS Today <${FROM_EMAIL}>" \
            --arg to "$TO_EMAIL" \
            --arg subject "$SUBJECT" \
            --arg html "$EMAIL_HTML" \
            '{from: $from, to: [$to], subject: $subject, html: $html}')

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Test email sent successfully to $TO_EMAIL"
          else
            echo "Failed to send test email (HTTP $HTTP_STATUS)"
            exit 1
          fi
