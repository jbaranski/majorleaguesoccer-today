name: send_test_email

on:
  workflow_dispatch:
    inputs:
      to_email:
        description: 'Email address to send the test to'
        required: true
        type: string
      date:
        description: 'Date to generate data for (YYYY-MM-DD, defaults to today)'
        required: false
        type: string
        default: ''
      skip_fixture_check:
        description: 'Send even if matches.json has no fixtures'
        required: false
        type: boolean
        default: false

jobs:
  send-test-email:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Generate matches.json
        env:
          TZ: America/New_York
          DATE_OVERRIDE: ${{ inputs.date }}
        run: node dist/index.js

      - name: Install Angular dependencies
        run: npm ci
        working-directory: client

      - name: Build Angular email-collector library
        run: npm run build:lib
        working-directory: client

      - name: Build Angular email pre-render
        run: npm run build:email
        working-directory: client

      - name: Check for fixtures
        id: check-fixtures
        env:
          SKIP_FIXTURE_CHECK: ${{ inputs.skip_fixture_check }}
        run: bash scripts/check-fixtures.sh

      - name: Mask sensitive inputs
        env:
          TO_EMAIL: ${{ inputs.to_email }}
        run: echo "::add-mask::$TO_EMAIL"

      - name: Send test email
        if: steps.check-fixtures.outputs.has_fixtures == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ inputs.to_email }}
          DATE_OVERRIDE: ${{ inputs.date }}
          IS_TEST: "true"
        run: |
          set -euo pipefail
          bash scripts/send-email.sh
          echo "Test email sent successfully"
