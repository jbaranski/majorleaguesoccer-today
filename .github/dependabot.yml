version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - '*'

  - package-ecosystem: 'npm'
    directory: '/cdk'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - '*'

  - package-ecosystem: 'npm'
    directory: '/client'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - '*'

  - package-ecosystem: 'npm'
    directory: '/client/projects/email-collector'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'
